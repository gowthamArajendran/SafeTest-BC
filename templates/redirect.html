<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Status</title>
    <style>
        body { 
            min-height: 100vh; margin: 0; padding: 20px 0; display: flex; align-items: center; justify-content: center; 
            background: #1a1a2e; font-family: sans-serif; overflow-y: auto; box-sizing: border-box;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .success-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; text-align: center; color: white;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 400px;
            animation: fadeIn 0.4s ease-out;
            transition: all 0.3s ease-in-out;
        }
        .status-msg { color: #4caf50; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        
        .code-display {
            background: rgba(255, 152, 0, 0.1); border: 2px dashed #ff9800;
            padding: 20px; border-radius: 12px; margin: 15px 0;
            font-size: 28px; font-weight: bold; color: #ff9800; letter-spacing: 3px;
        }
        .main-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 10px; border: none; font-weight: bold; cursor: pointer;
            text-decoration: none; color: white; transition: 0.3s;
            box-sizing: border-box; text-align: center;
        }
        .main-btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="success-card">
        {% if 'SUCCESS_SUBMIT' in msg %}
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            <div class="status-msg">Exam Completed Successfully!</div>
            <p style="font-size: 14px; color: #ccc;">Your Score:</p>
            <div class="code-display" style="border-color: #4caf50; color: #4caf50; background: rgba(76, 175, 80, 0.1);">{{ msg.split(': ')[1] }} / 100</div>
        {% elif 'SUCCESS' in msg %}
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            <div class="status-msg">Exam Created Successfully!</div>
            <p style="font-size: 14px; color: #ccc;">Your Unique Exam Code is:</p>
            <div class="code-display">{{ msg.split(': ')[1] }}</div>
            <button onclick="copyCode()" class="main-btn" style="background: #4caf50; margin-bottom: 10px;">📋 Copy Exam Code</button>
            <a href="/admin" class="main-btn" style="background: #ff9800; display: block; text-decoration: none; text-align: center; box-sizing: border-box;">➕ Create Another Exam</a>
        {% else %}
            <div style="font-size: 50px; margin-bottom: 10px;">❌</div>
            <div class="status-msg" style="color: #f44336;">{{ msg }}</div>
        {% endif %}
        
        <a href="/" class="main-btn" style="background: #2196f3; margin-top: 20px;">⬅️ Back to Home</a>
    </div>

    <script>
        function copyCode() {
            let code = "{{ msg.split(': ')[1] if ':' in msg else msg }}";
            navigator.clipboard.writeText(code);
            alert("Code Copied: " + code);
        }
    </script>
</body>
</html>
