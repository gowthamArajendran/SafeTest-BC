<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blockchain Result Verifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        /* Screen height-kku thagundha maari fixed layout */
        body { 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 0;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #1a1a2e;
            overflow-y: auto; 
            font-family: sans-serif;
            box-sizing: border-box;
        }

        .glass-card { 
            max-width: 500px; 
            width: 90%; 
            max-height: 95vh; 
            padding: 30px; 
            display: flex;
            flex-direction: column;
            text-align: center;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.4s ease-out;
            transition: all 0.3s ease-in-out;
        }

        /* FIX: Placeholder & Input Visibility */
        input::placeholder {
            color: rgba(255, 255, 255, 0.8) !important;
            opacity: 1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
            color: white !important;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .main-btn {
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            background: #2196f3; 
            color: white;
            transition: 0.3s;
            box-sizing: border-box;
            text-align: center;
            display: block;
        }

        .main-btn:hover { opacity: 0.9; transform: scale(1.02); }

        .result-box {
            margin-top: 20px; 
            padding: 15px; 
            background: rgba(0,255,0,0.1); 
            border: 1px solid #00ff00; 
            border-radius: 10px; 
            color: white;
        }

    </style>
</head>
<body>
    <div class="glass-card">
        <h2 style="color: white; margin-bottom: 20px;">🔍 Blockchain Result Verifier</h2>
        
        <form action="/view_result" method="post">
            <input type="number" name="id" placeholder="Enter Student ID" required>
            <input type="text" name="exam_code" placeholder="Enter Exam Code (e.g., ABC123)" required>
            
            <button type="submit" class="main-btn">Verify in Ledger</button>
        </form>

        {% if result %}
            <div class="result-box">
                <p><strong>Name:</strong> {{ result.name }}</p>
                <p><strong>Marks:</strong> {{ result.marks }}/100</p>
                <p><strong>Status:</strong> Verified on Blockchain</p>
            </div>
        {% endif %}

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <a href="/" class="main-btn" style="background: #607d8b; flex: 1; text-decoration: none;">⬅️ Home</a>
            {% if session.get('admin_logged_in') %}
            <a href="/admin" class="main-btn" style="background: #ff9800; flex: 1; text-decoration: none;">🛠️ Admin</a>
            {% endif %}
        </div>
    </div>
</body>
