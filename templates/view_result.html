<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blockchain Result Verifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Screen height-kku thagundha maari fixed layout */
        body { 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #1a1a2e;
            overflow: hidden; 
        }

        .glass-card { 
            max-width: 500px; 
            width: 90%; 
            max-height: 95vh; 
            padding: 30px; 
            display: flex;
            flex-direction: column;
            text-align: center;
            box-sizing: border-box;
        }

        /* FIX: Placeholder & Input Visibility */
        input::placeholder {
            color: rgba(255, 255, 255, 0.8) !important;
            opacity: 1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
            color: white !important;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .main-btn {
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            background: #2196f3; 
            color: white;
            transition: 0.3s;
        }

        .main-btn:hover { opacity: 0.9; }

        .result-box {
            margin-top: 20px; 
            padding: 15px; 
            background: rgba(0,255,0,0.1); 
            border: 1px solid #00ff00; 
            border-radius: 10px; 
            color: white;
        }

        .home-link { 
            text-align: center; 
            margin-top: 20px; 
            color: #ccc; 
            text-decoration: none; 
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 style="color: white; margin-bottom: 20px;">🔍 Blockchain Result Verifier</h2>
        
        <form action="/view_result" method="post">
            <input type="number" name="id" placeholder="Enter Student ID" required>
            <input type="text" name="exam_code" placeholder="Enter Exam Code (e.g., ABC123)" required>
            
            <button type="submit" class="main-btn">Verify in Ledger</button>
        </form>

        {% if result %}
            <div class="result-box">
                <p><strong>Name:</strong> {{ result.name }}</p>
                <p><strong>Marks:</strong> {{ result.marks }}/100</p>
                <p><strong>Status:</strong> Verified on Blockchain</p>
            </div>
        {% endif %}

        <a href="/" class="home-link">⬅️ Back to Home</a>
    </div>
</body>
</html>
