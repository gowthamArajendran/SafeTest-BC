<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Control Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { 
        height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; 
        background: #1a1a2e; overflow: hidden; 
    }
    .glass-card { 
        max-width: 580px; width: 90%; max-height: 96vh; /* Card height-a konjam kurachuttaen */
        padding: 10px 15px; display: flex; flex-direction: column; gap: 3px; /* Gap-a kurachuttaen */
    }
    /* FIX: Bottom link position */
    .home-link { 
        text-align: center; font-size: 11px; color: #ccc; 
        text-decoration: none; margin-top: auto; padding-top: 5px; 
    }
        /* Screen height-kku thagundha maari fixed layout */
        body { 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #1a1a2e;
            overflow: hidden; 
        }

        .glass-card { 
            max-width: 580px; 
            width: 90%; 
            height: auto; 
            max-height: 98vh; 
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* FIX: Placeholder visibility and Type color */
        input::placeholder { 
            color: rgba(255, 255, 255, 0.9) !important; 
            opacity: 1; 
        }

        input, select, textarea {
            font-size: 12px !important;
            padding: 5px !important;
            background: rgba(255, 255, 255, 0.15);
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            outline: none;
        }

        /* Dropdown Visibility Fix */
        select option { color: black !important; background: white !important; }

        h2 { margin: 0; font-size: 18px; text-align: center; color: white; }
        
        .final-submit-box {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 4px;
            margin-top: 2px;
        }

        .main-btn {
            border: none;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
            font-weight: bold;
            color: white;
        }
        .main-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="glass-card">
        <a href="/" class="home-link">⬅️ Back to Home</a>
    </div>
    <div class="glass-card">
        {% if login_mode %}
            <h2>🔐 Staff Login</h2>
            <form action="/admin" method="post" style="display: flex; flex-direction: column; gap: 8px;">
                <input type="password" name="password" placeholder="Enter Staff Password" required>
                <button type="submit" class="main-btn" style="background:#ff9800; padding: 10px;">Login</button>
            </form>
        {% else %}
            <h2>🛠️ Exam Configurator</h2>
            
            <div style="background: rgba(76, 175, 80, 0.15); padding: 5px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid rgba(76, 175, 80, 0.3);">
                <label style="font-size: 12px; color: white;">⏲️ Duration:</label>
                <input type="number" id="exam_duration" value="10" style="width: 45px; text-align: center;">
                <span style="color:white; font-size: 11px;">Mins</span>
            </div>

            <div style="background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px; display: flex; flex-direction: column; gap: 4px;">
                <input type="text" id="ques" placeholder="Type Question here...">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                    <input type="text" id="optA" placeholder="Option A"><input type="text" id="optB" placeholder="Option B">
                    <input type="text" id="optC" placeholder="Option C"><input type="text" id="optD" placeholder="Option D">
                </div>
                <select id="correctAns">
                    <option value="" disabled selected>Select Correct Option</option>
                    <option value="A">A</option><option value="B">B</option>
                    <option value="C">C</option><option value="D">D</option>
                </select>
                <button type="button" onclick="addToJSON()" class="main-btn" style="background:#4caf50; padding: 6px !important;">➕ Add to List</button>
            </div>

            <div class="final-submit-box">
                <form action="/admin" method="post" style="display:flex; flex-direction:column; gap: 4px;">
                    <input type="hidden" name="password" value="staff123">
                    <input type="hidden" id="final_duration" name="duration" value="10">
                    <textarea id="json_box" name="bulk_data" readonly required style="height: 40px; color: #00ff00; font-size: 10px !important;" placeholder="JSON Preview..."></textarea>
                    
                    <button type="submit" class="main-btn" style="background:orange; padding: 10px !important; font-size: 14px !important;">🚀 Release Exam & Generate Code</button>
                </form>
            </div>
        {% endif %}

        <a href="/" style="text-align: center; font-size: 11px; color: #ccc; text-decoration: none; margin-top: 5px;">⬅️ Back to Home</a>
    </div>

    <script>
        let qList = [];
        function addToJSON() {
            let q = document.getElementById('ques').value;
            let oA = document.getElementById('optA').value;
            let oB = document.getElementById('optB').value;
            let oC = document.getElementById('optC').value;
            let oD = document.getElementById('optD').value;
            let correct = document.getElementById('correctAns').value;
            
            if(q && oA && oB && oC && oD && correct) {
                qList.push({ "q": q, "options": [oA, oB, oC, oD], "a": correct });
                document.getElementById('json_box').value = JSON.stringify(qList, null, 2);
                document.getElementById('final_duration').value = document.getElementById('exam_duration').value;
                
                // AUTO RESET FIELDS
                document.getElementById('ques').value = '';
                document.getElementById('optA').value = ''; document.getElementById('optB').value = '';
                document.getElementById('optC').value = ''; document.getElementById('optD').value = '';
                document.getElementById('correctAns').selectedIndex = 0;
            } else { alert("Please fill all fields!"); }
        }
    </script>
</body>
</html>
