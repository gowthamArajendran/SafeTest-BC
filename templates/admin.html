<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Control Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { 
            min-height: 100vh; margin: 0; padding: 20px 0; display: flex; align-items: center; justify-content: center; 
            background: #1a1a2e; overflow-y: auto; font-family: 'Segoe UI', sans-serif; box-sizing: border-box;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { 
            max-width: 420px; width: 92%; height: auto; max-height: 98vh; 
            padding: 10px 15px; display: flex; flex-direction: column; gap: 5px; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.4s ease-out; transition: all 0.3s ease-in-out;
        }
        input, select, textarea {
            font-size: 13px !important; padding: 6px !important; background: rgba(255, 255, 255, 0.1);
            color: white !important; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; outline: none;
        }
        select option { color: black !important; }
        h2 { margin: 0; font-size: 17px; text-align: center; color: white; }
        .main-btn { border: none; cursor: pointer; border-radius: 8px; font-weight: bold; color: white; transition: 0.3s; box-sizing: border-box; text-align: center; }
        .main-btn:hover { opacity: 0.9; transform: scale(1.02); }
        
        .q-nav-box { 
            background: rgba(0,0,0,0.3); padding: 6px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-controls { display: flex; gap: 4px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="glass-card">
        {% if error %}<div style="color: #f44336; padding: 5px; text-align: center; font-size: 13px; font-weight: bold;">{{ error }}</div>{% endif %}
        {% if login_mode %}
            <h2>🔐 Staff Login</h2>
            <form action="/admin" method="post" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="password" name="password" placeholder="Staff Password" required>
                <button type="submit" class="main-btn" style="background: orange; padding: 12px;">Login</button>
            </form>
        {% else %}
            <h2>🛠️ Exam Configurator</h2>
            
            <div style="background: rgba(76, 175, 80, 0.1); padding: 5px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <input type="text" id="subject_name" placeholder="Exam Type/Subject (ex: Midterm)" style="flex: 1;">
                <label style="font-size: 11px; color: #4caf50;">⏲️ Mins:</label>
                <input type="number" id="exam_duration" value="10" style="width: 40px; text-align: center; padding: 2px !important;">
            </div>

            <div style="background: rgba(255,255,255,0.02); padding: 6px; border-radius: 10px; display: flex; flex-direction: column; gap: 3px;">
                <input type="text" id="ques" placeholder="Type Question here...">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                    <input type="text" id="optA" placeholder="A"><input type="text" id="optB" placeholder="B">
                    <input type="text" id="optC" placeholder="C"><input type="text" id="optD" placeholder="D">
                </div>
                <select id="correctAns">
                    <option value="" disabled selected>Correct Ans</option>
                    <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
                </select>
                <button type="button" onclick="addToJSON()" class="main-btn" style="background: #4caf50; padding: 7px;">➕ Add Question</button>
            </div>

            <div class="q-nav-box">
                <p id="preview_text" style="color: #00ff00; font-size: 11px; margin: 0; white-space: pre-wrap;">No questions added.</p>
                <div class="nav-controls">
                    <button type="button" onclick="navQ(-1)" class="main-btn" style="background: #555; font-size: 10px; flex: 1; padding: 5px;">⬅️ Prev</button>
                    <button type="button" onclick="deleteThisQ()" class="main-btn" style="background: #f44336; font-size: 10px; flex: 1; padding: 5px;">🗑️ Delete</button>
                    <button type="button" onclick="navQ(1)" class="main-btn" style="background: #555; font-size: 10px; flex: 1; padding: 5px;">Next ➡️</button>
                </div>
            </div>

            <form action="/admin" method="post" style="display:flex; flex-direction:column; gap: 3px;" onsubmit="return validateSubject()">
                <input type="hidden" name="password" value="staff123">
                <input type="hidden" id="final_duration" name="duration" value="10">
                <textarea id="json_box" name="bulk_data" readonly required style="display: none;"></textarea>
                <button type="submit" class="main-btn" style="background: linear-gradient(135deg, #ff9800, #f57c00); padding: 10px; font-size: 14px;">🚀 Release Exam & Get Code</button>
            </form>
            <a href="/view_result" class="main-btn" style="background: #2196f3; padding: 10px; font-size: 14px; margin-top: 5px; text-decoration: none;">🔍 Verify Student Results</a>
        {% endif %}
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <a href="/" class="main-btn" style="background: #607d8b; flex: 1; text-decoration: none; padding: 10px; font-size: 14px;">⬅️ Home</a>
            {% if not login_mode %}
            <form action="/admin" method="post" style="flex: 1;">
                <input type="hidden" name="logout" value="1">
                <button type="submit" class="main-btn" style="background: #f44336; width: 100%; padding: 10px; font-size: 14px;">🚪 Logout</button>
            </form>
            {% endif %}
        </div>
    </div>

    <script>
        let qList = []; let curIdx = 0;
        function addToJSON() {
            let q = document.getElementById('ques').value;
            let a = document.getElementById('optA').value; let b = document.getElementById('optB').value;
            let c = document.getElementById('optC').value; let d = document.getElementById('optD').value;
            let cor = document.getElementById('correctAns').value;
            if(q && a && b && c && d && cor) {
                qList.push({ "q": q, "options": [a, b, c, d], "a": cor });
                curIdx = qList.length - 1; updateUI(); clearInputs();
            } else { alert("Fill all fields!"); }
        }
        function deleteThisQ() {
            if (qList.length > 0) {
                qList.splice(curIdx, 1);
                if (curIdx >= qList.length) curIdx = qList.length - 1;
                updateUI();
            }
        }
        function navQ(step) {
            let nIdx = curIdx + step;
            if (nIdx >= 0 && nIdx < qList.length) { curIdx = nIdx; updateUI(); }
        }
        function validateSubject() {
            let subj = document.getElementById('subject_name').value;
            if(!subj) { alert("Please enter the Exam Type/Subject!"); return false; }
            if(qList.length === 0) { alert("Please add at least 1 question!"); return false; }
            updateUI();
            return true;
        }
        function updateUI() {
            let p = document.getElementById('preview_text');
            if (qList.length > 0) {
                let d = qList[curIdx];
                p.innerHTML = `<b>Q${curIdx + 1}/${qList.length}:</b> ${d.q}
A) ${d.options[0]}  B) ${d.options[1]}
C) ${d.options[2]}  D) ${d.options[3]}
<i>Ans: ${d.a}</i>`;
            } else { p.innerHTML = "No questions added."; }
            
            let subj = document.getElementById('subject_name') ? document.getElementById('subject_name').value : "General Exam";
            let finalPayload = { subject: subj, questions: qList };
            document.getElementById('json_box').value = JSON.stringify(finalPayload);
            document.getElementById('final_duration').value = document.getElementById('exam_duration') ? document.getElementById('exam_duration').value : 10;
        }
        function clearInputs() {
            document.getElementById('ques').value = ''; document.getElementById('optA').value = '';
            document.getElementById('optB').value = ''; document.getElementById('optC').value = '';
            document.getElementById('optD').value = ''; document.getElementById('correctAns').selectedIndex = 0;
        }
    </script>
</body>
</html>
